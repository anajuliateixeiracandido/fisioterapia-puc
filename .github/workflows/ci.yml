name: CI

on:
  push:
    branches:
      - main
      - master

jobs:
  test:
          cd frontend
          npm test || echo "No frontend tests found"

  delete-branch:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/') && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
    steps:
      - name: Delete branch after merge
        uses: dawidd6/action-delete-branch@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branches: ${{ github.ref_name }}
